<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INF349 — Créer un compte</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f6fbf7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .logo {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #4caf50;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.83rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
        }
        .form-group .hint {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover   { background: #388e3c; }
        .btn:active  { transform: scale(0.98); }
        .btn:disabled { background: #aaa; cursor: not-allowed; }

        .error-msg {
            background: #fdecea;
            border: 1px solid #ef9a9a;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.87rem;
            margin-top: 12px;
            display: none;
        }

        .divider {
            text-align: center;
            color: #ccc;
            font-size: 0.82rem;
            margin: 20px 0 14px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #eee;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .link-btn {
            display: block;
            text-align: center;
            width: 100%;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #555;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .link-btn:hover { border-color: #4caf50; color: #4caf50; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #4caf50;
            text-decoration: none;
            font-size: 0.88rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">🌿 INF349</div>
        <p class="subtitle">Créez votre compte pour commander</p>

        <form id="register-form" onsubmit="doRegister(event)">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="ex : marie123" autocomplete="username" required minlength="3">
                <div class="hint">Minimum 3 caractères, lettres et chiffres.</div>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••" autocomplete="new-password" required minlength="4">
                <div class="hint">Minimum 4 caractères.</div>
            </div>
            <div class="form-group">
                <label for="password2">Confirmer le mot de passe</label>
                <input type="password" id="password2" placeholder="••••" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn" id="register-btn">Créer le compte</button>
            <div class="error-msg" id="error-msg"></div>
        </form>

        <div class="divider">ou</div>
        <a href="/ui/login" class="link-btn">Se connecter à un compte existant</a>

        <a href="/ui" class="back-link">← Retour à la boutique</a>
    </div>

    <script>
        async function doRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errEl = document.getElementById('error-msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            errEl.style.display = 'none';

            if (password !== password2) {
                errEl.textContent = 'Les mots de passe ne correspondent pas.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Création...';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (res.status === 201) {
                    localStorage.setItem('inf349_user', data.user);
                    const next = new URLSearchParams(window.location.search).get('next') || '/ui';
                    window.location.href = next;
                } else {
                    errEl.textContent = data.error || 'Erreur lors de la création du compte.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Créer le compte';
                }
            } catch (err) {
                errEl.textContent = 'Erreur réseau : ' + err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Créer le compte';
            }
        }

        // Si déjà connecté, rediriger
        fetch('/me').then(r => r.json()).then(d => {
            if (d.user) window.location.href = '/ui';
        });
    </script>
</body>
</html>
